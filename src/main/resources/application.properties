spring.application.name=crit

# AWS 설정 (EC2 IAM Role 사용 시 별도 키 불필요)
aws.region=us-east-1
aws.bedrock.model-id=anthropic.claude-3-haiku-20240307-v1:0

spring.config.import=optional:application-secret.yml

spring.datasource.url=jdbc:mysql://localhost:3306/crit?useSSL=false&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Google OAuth2
spring.security.oauth2.client.registration.google.scope=openid,email,profile,https://www.googleapis.com/auth/youtube.readonly
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# JWT
app.jwt.expiration-ms=86400000

# OAuth2 로그인 성공 후 프론트엔드로 리다이렉트할 URL
app.oauth2.redirect-url=http://localhost:3000/oauth-callback

logging.level.org.springframework.security=DEBUG
