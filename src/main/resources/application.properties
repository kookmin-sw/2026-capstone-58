spring.application.name=crit

# ============================================
# AWS 설정 (EC2 IAM Role 사용 시 별도 키 불필요)
# ============================================
aws.region=${AWS_REGION:us-east-1}
aws.bedrock.model-id=${AWS_BEDROCK_MODEL_ID:anthropic.claude-3-haiku-20240307-v1:0}
aws.s3.bucket=${AWS_S3_BUCKET}
aws.s3.scoring-bucket=${AWS_S3_SCORING_BUCKET:pj-kmucd1-08-s3-data-collector}

# ============================================
# GCP 설정 (Imagen용)
# ============================================
gcp.key-path=${GCP_KEY_PATH:./gcp-key/gcp-key.json}

# ============================================
# Google APIs
# ============================================
gemini.api.key=${GEMINI_API_KEY}
youtube.api.key=${YOUTUBE_API_KEY}

# ============================================
# Secret 설정 (OAuth2 client-id/secret 등)
# ============================================
spring.config.import=optional:application-secret.yml

# ============================================
# Database Configuration
# ============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/crit?useSSL=false&serverTimezone=Asia/Seoul}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# ============================================
# Google OAuth2
# ============================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy}
spring.security.oauth2.client.registration.google.scope=openid,email,profile,https://www.googleapis.com/auth/youtube.readonly
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth?access_type=offline&prompt=consent

# ============================================
# JWT
# ============================================
app.jwt.expiration-ms=86400000

# ============================================
# OAuth2 리다이렉트
# ============================================
app.oauth2.redirect-url=${APP_OAUTH2_REDIRECT_URL:http://localhost:3000/oauth-callback}

logging.level.org.springframework.security=DEBUG
